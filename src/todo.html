<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Meta tags for character set and viewport settings -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Tailwind CSS for styling -->
    <link href="./output.css" rel="stylesheet" />

    <!-- Font Awesome for icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Todo App</title>
    <style>
      body {
        font-family: "Poppins", sans-serif;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .fade-in {
        animation: fadeIn 0.5s ease-in-out;
      }
    </style>
  </head>
  <body class="bg-gray-900 text-white">
    <div class="container mx-auto px-4">
      <h1 class="text-4xl font-bold text-center my-8">Todo App</h1>

      <!-- =================================================================================
    Input Section: Contains the form for adding new todo items.
    ================================================================================= -->
      <section
        id="input-section"
        class="container my-0 w-4/5 mx-auto md:w-2/3 md:my-2 md:mx-auto"
      >
        <form
          id="todo-form"
          class="flex flex-col items-center gap-2 mt-2 hover:shadow-amber-500 bg-gray-800 rounded-2xl p-4 shadow-2xl md:flex-row md:justify-between md:gap-2"
        >
        <input
          type="text"
          id="todo-title"
          class="w-full md:w-1/3 px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Add a title..."
        />
        <input
          type="text"
          id="todo-content"
          placeholder="Add a description..."
          class="w-full md:w-1/2 px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
        <button
          type="submit"
          id="todo-submit"
          class="w-full md:w-auto px-6 py-2 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50"
        >
          Add Note
        </button>
      </form>
    </section>

    <!-- =================================================================================
    Todo Grid Section: Displays the list of todo items.
    ================================================================================= -->
    <section id="todo-section" class="mt-10 container">
      <!-- The grid where todo cards will be dynamically inserted by JavaScript -->
      <div
        id="todo-grid"
        class="grid grid-cols-1 gap-4 w-11/12 mx-auto lg:grid-cols-3 lg:gap-8"
      ></div>
    </section>

    <!-- =================================================================================
    Edit Modal: A hidden modal that appears when the user clicks the edit icon.
    ================================================================================= -->
    <div
      id="editTodoModal"
      class="fixed inset-0 bg-black bg-opacity-75 z-50 flex items-center justify-center p-4 hidden"
    >
      <div class="bg-gray-800 rounded-lg shadow-xl w-full max-w-md p-6">
        <h2 class="text-2xl font-semibold text-white mb-6">Edit Todo</h2>

        <!-- Form within the modal for editing a task -->
        <form id="todoForm" class="space-y-6">
          <div>
            <label for="todoTitle" class="text-sm font-medium text-gray-300"
              >Title</label
            >
            <input
              type="text"
              id="todoTitle"
              class="w-full mt-2 px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>
          <div>
            <label for="todoContent" class="text-sm font-medium text-gray-300"
              >Content</label
            >
            <textarea
              id="todoContent"
              rows="3"
              class="w-full mt-2 px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"
            ></textarea>
          </div>

          <!-- Modal action buttons -->
          <div class="flex justify-end space-x-4 mt-8">
            <button
              type="button"
              id="cancelBtn"
              class="px-6 py-2 text-sm font-semibold text-gray-300 rounded-lg hover:bg-gray-700 focus:outline-none"
            >
              CANCEL
            </button>
            <button
              type="submit"
              class="px-6 py-2 text-sm font-semibold text-white bg-blue-600 rounded-lg hover:bg-blue-700 focus:outline-none"
            >
              SUBMIT
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- JavaScript file -->
    <script src="./todo.js"></script>
  </body>
</html>
