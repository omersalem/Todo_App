<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Meta tags for character set and viewport settings -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Tailwind CSS for styling -->
    <link href="./output.css" rel="stylesheet" />

    <!-- Font Awesome for icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Todo App</title>
  </head>
  <body
    class="h-screen dark:bg-gradient-to-br from-green-700 to-slate-700 dark:text-black container my-0 mx-auto"
  >
    <!-- =================================================================================
    Input Section: Contains the form for adding new todo items.
    ================================================================================= -->
    <section
      id="input-section"
      class="container my-0 w-4/5 mx-auto md:w-2/3 md:my-2 md:mx-auto"
    >
      <h1 class="text-2xl font-bold text-center">Todo App</h1>
      <form
        id="todo-form"
        class="flex flex-col items-center gap-2 mt-2 hover:shadow-amber-500 bg-gray-400 rounded-2xl p-4 shadow-2xl md:flex-row md:justify-between md:gap-2"
      >
        <input
          type="text"
          id="todo-title"
          class="w-2/3 border-2 rounded placeholder:text-dark-950"
          placeholder="Add a title..."
        />
        <input
          type="text"
          id="todo-content"
          placeholder="Add a description..."
          class="w-2/3 border-2 rounded placeholder:text-dark-950"
        />
        <button
          type="submit"
          id="todo-submit"
          class="py-3 px-4 inline-flex items-center gap-x-2 text-xs font-medium rounded-2xl border border-transparent bg-gray-500 text-white text-shadow-2xs hover:bg-gray-700 hover:shadow-4xl focus:outline-hidden focus:bg-amber-600 disabled:opacity-50 disabled:pointer-events-none"
        >
          Add Note
        </button>
      </form>
    </section>

    <!-- =================================================================================
    Todo Grid Section: Displays the list of todo items.
    ================================================================================= -->
    <section id="todo-section" class="mt-10 container">
      <!-- The grid where todo cards will be dynamically inserted by JavaScript -->
      <div
        id="todo-grid"
        class="grid grid-cols-1 gap-4 w-11/12 mx-auto lg:grid-cols-3 lg:gap-8"
      ></div>
    </section>

    <!-- =================================================================================
    Edit Modal: A hidden modal that appears when the user clicks the edit icon.
    ================================================================================= -->
    <div
      id="editTodoModal"
      class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4 hidden"
    >
      <div class="bg-white rounded-lg shadow-xl w-full max-w-md p-6">
        <h2 class="text-2xl font-semibold text-gray-800 mb-6">Edit Todo</h2>

        <!-- Form within the modal for editing a task -->
        <form id="todoForm" class="space-y-6">
          <div class="relative">
            <label
              for="todoTitle"
              class="absolute -top-2.5 left-2 bg-white px-1 text-sm text-gray-500"
              >Title</label
            >
            <input
              type="text"
              id="todoTitle"
              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>
          <div class="relative">
            <label
              for="todoContent"
              class="absolute -top-2.5 left-2 bg-white px-1 text-sm text-gray-500"
              >Content</label
            >
            <textarea
              id="todoContent"
              rows="3"
              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"
            ></textarea>
          </div>

          <!-- Modal action buttons -->
          <div class="flex justify-end space-x-4 mt-8">
            <button
              type="button"
              id="cancelBtn"
              class="px-4 py-2 text-sm font-semibold text-purple-600 rounded-md hover:bg-gray-100 focus:outline-none"
            >
              CANCEL
            </button>
            <button
              type="submit"
              class="px-4 py-2 text-sm font-semibold text-blue-600 rounded-md hover:bg-gray-100 focus:outline-none"
            >
              SUBMIT
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- JavaScript file -->
    <script src="./todo.js"></script>
  </body>
</html>
